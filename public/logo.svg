<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Cyan neon glow effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Monogram EC -->
  <g filter="url(#neon-glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- E shape -->
    <path d="M 65 70 L 105 70 M 65 70 L 65 130 L 105 130 M 65 100 L 95 100" stroke-width="8" stroke="#0ea5e9" />
    <!-- C shape overlapping E -->
    <path d="M 135 75 C 115 55, 85 55, 85 100 C 85 145, 115 145, 135 125" stroke-width="8" stroke="#06b6d4" />
  </g>
  <!-- Text branding underneath -->
  <text x="100" y="170" font-family="'Outfit', sans-serif" font-size="10" font-weight="700" fill="#ffffff" letter-spacing="3" text-anchor="middle">EASTERN WAVE CREATIONS</text>
</svg>
